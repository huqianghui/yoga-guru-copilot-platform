name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Build
        run: npm run build

  e2e-test:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Initialize backend DB
        run: |
          cd backend
          python scripts/init_db.py
          python scripts/seed_data.py

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: |
          cd frontend
          npx playwright test --reporter=list
        env:
          CI: true

  deploy:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, e2e-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push backend image to ACR
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az acr build \
              --registry ${{ vars.ACR_NAME }} \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --image yoga-guru-backend:${{ github.sha }} \
              --image yoga-guru-backend:latest \
              --file backend/Dockerfile \
              backend/

      - name: Build and push frontend image to ACR
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az acr build \
              --registry ${{ vars.ACR_NAME }} \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --image yoga-guru-frontend:${{ github.sha }} \
              --image yoga-guru-frontend:latest \
              --file frontend/Dockerfile \
              frontend/

      - name: Deploy backend to Container Apps
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp update \
              --name yoga-guru-backend \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --image ${{ vars.ACR_NAME }}.azurecr.io/yoga-guru-backend:${{ github.sha }} \
              --set-env-vars \
                DEBUG="false" \
                JWT_SECRET="${{ secrets.JWT_SECRET }}" \
                AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
                AZURE_OPENAI_KEY="${{ secrets.AZURE_OPENAI_KEY }}" \
                AZURE_OPENAI_DEPLOYMENT="${{ vars.AZURE_OPENAI_DEPLOYMENT || 'gpt-4o' }}" \
                AZURE_CU_ENDPOINT="${{ secrets.AZURE_CU_ENDPOINT }}" \
                AZURE_CU_KEY="${{ secrets.AZURE_CU_KEY }}"

      - name: Deploy frontend to Container Apps
        uses: azure/CLI@v2
        with:
          inlineScript: |
            BACKEND_FQDN=$(az containerapp show \
              --name yoga-guru-backend \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --query 'properties.configuration.ingress.fqdn' -o tsv)
            az containerapp update \
              --name yoga-guru-frontend \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --image ${{ vars.ACR_NAME }}.azurecr.io/yoga-guru-frontend:${{ github.sha }} \
              --set-env-vars "BACKEND_URL=https://${BACKEND_FQDN}"

      - name: Verify backend health
        uses: azure/CLI@v2
        with:
          inlineScript: |
            BACKEND_FQDN=$(az containerapp show \
              --name yoga-guru-backend \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --query 'properties.configuration.ingress.fqdn' -o tsv)
            for i in {1..10}; do
              if curl -sf "https://${BACKEND_FQDN}/api/health" | grep -q '"status"'; then
                echo "Backend is healthy"
                exit 0
              fi
              echo "Waiting for backend... (attempt $i/10)"
              sleep 10
            done
            echo "Backend health check failed"
            exit 1
