name: Sync Wiki

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - 'docs/superpowers/**'
      - 'CLAUDE.md'
      - 'README.md'
      - 'backend/app/routers/**'
      - 'backend/app/models/**'
      - 'backend/tests/**'
      - 'frontend/src/pages/**'

jobs:
  sync-wiki:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate dynamic wiki pages
        run: bash .github/scripts/generate-wiki-pages.sh

      - name: Sync to Wiki repo
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"

          if git clone "$WIKI_URL" /tmp/wiki-deploy 2>/dev/null; then
            echo "Wiki repo cloned"
          else
            echo "Wiki not initialized — creating from scratch"
            mkdir -p /tmp/wiki-deploy
            cd /tmp/wiki-deploy
            git init
            git remote add origin "$WIKI_URL"
            cd -
          fi

          cp wiki/*.md /tmp/wiki-deploy/

          cd /tmp/wiki-deploy
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to push"
          else
            git commit -m "auto-sync wiki from main branch"
            if git push origin HEAD:master 2>/dev/null || git push origin HEAD:main 2>/dev/null; then
              echo "Wiki synced successfully"
            else
              echo "::warning::Wiki push failed — initialize wiki at GitHub Web UI first"
              echo "Visit: https://github.com/${{ github.repository }}/wiki/_new"
            fi
          fi
